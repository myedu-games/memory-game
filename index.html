<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>משחק זיכרון - כוחות</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      user-select: none;
      -webkit-user-select: none;
    }

    h1 {
      color: white;
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .stats {
      display: flex;
      gap: 30px;
      margin-bottom: 20px;
      color: white;
      font-size: 1.3rem;
    }

    .stats span {
      background: rgba(255,255,255,0.2);
      padding: 8px 20px;
      border-radius: 25px;
      backdrop-filter: blur(5px);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      max-width: 800px;
      width: 100%;
      perspective: 1000px;
    }

    @media (max-width: 600px) {
      .board {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
      h1 { font-size: 1.8rem; }
      .stats { font-size: 1rem; gap: 15px; }
    }

    .card {
      aspect-ratio: 16 / 9;
      cursor: pointer;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s ease;
      border-radius: 15px;
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card.matched {
      transform: rotateY(180deg);
      animation: matchPulse 0.6s ease;
    }

    .card.matched .card-front {
      box-shadow: 0 0 20px 5px rgba(76, 175, 80, 0.6);
      border: 3px solid #4CAF50;
    }

    @keyframes matchPulse {
      0% { transform: rotateY(180deg) scale(1); }
      50% { transform: rotateY(180deg) scale(1.08); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card-back {
      background: linear-gradient(145deg, #ff9a56, #ff6f61);
      border: 3px solid #fff;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      flex-direction: column;
      gap: 8px;
    }

    .card-back img {
      width: 60px;
      height: 60px;
      opacity: 0.9;
      filter: brightness(0) invert(1);
    }

    .card-back .q-mark {
      font-size: 2.5rem;
      color: white;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .card-front {
      background: white;
      transform: rotateY(180deg);
      border: 3px solid #e0e0e0;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .card-front img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 5px;
    }

    .btn-restart {
      margin-top: 25px;
      padding: 15px 40px;
      font-size: 1.3rem;
      border: none;
      border-radius: 30px;
      background: linear-gradient(145deg, #ff9a56, #ff6f61);
      color: white;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }

    .btn-restart:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    .btn-restart:active {
      transform: translateY(0);
    }

    /* Win overlay */
    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .overlay.show {
      display: flex;
    }

    .win-card {
      background: white;
      border-radius: 25px;
      padding: 40px 50px;
      text-align: center;
      animation: popIn 0.5s ease;
    }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .win-card h2 {
      font-size: 2.5rem;
      color: #4CAF50;
      margin-bottom: 10px;
    }

    .win-card .stars {
      font-size: 3rem;
      margin: 15px 0;
    }

    .win-card p {
      font-size: 1.3rem;
      color: #555;
      margin-bottom: 20px;
    }

    .confetti {
      position: fixed;
      top: -10px;
      z-index: 101;
      width: 12px;
      height: 12px;
      border-radius: 2px;
      animation: fall linear forwards;
      pointer-events: none;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <h1>משחק זיכרון - כוחות 💪</h1>

  <div class="stats">
    <span>ניסיונות: <strong id="attempts">0</strong></span>
    <span>זוגות: <strong id="pairs">0</strong> / <strong id="totalPairs">4</strong></span>
  </div>

  <div class="board" id="board"></div>

  <button class="btn-restart" id="restartBtn" onclick="initGame()">משחק חדש 🔄</button>

  <div class="overlay" id="overlay">
    <div class="win-card">
      <h2>כל הכבוד! 🎉</h2>
      <div class="stars">⭐⭐⭐</div>
      <p id="winMsg">מצאת את כל הזוגות!</p>
      <button class="btn-restart" onclick="closeOverlay(); initGame();">שחק שוב 🔄</button>
    </div>
  </div>

  <script src="cards-data.js"></script>
  <script>
    let flippedCards = [];
    let matchedPairs = 0;
    let attempts = 0;
    let lockBoard = false;

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function initGame() {
      flippedCards = [];
      matchedPairs = 0;
      attempts = 0;
      lockBoard = false;
      document.getElementById('attempts').textContent = '0';
      document.getElementById('pairs').textContent = '0';

      // Create pairs
      let deck = [];
      CARDS.forEach((card, idx) => {
        deck.push({ ...card, pairId: idx });
        deck.push({ ...card, pairId: idx });
      });
      shuffle(deck);

      const board = document.getElementById('board');
      board.innerHTML = '';

      deck.forEach((card, i) => {
        const el = document.createElement('div');
        el.className = 'card';
        el.dataset.pairId = card.pairId;
        el.dataset.index = i;
        el.innerHTML = `
          <div class="card-face card-back">
            <img src="${CARD_BACK}" alt="card back">
            <span class="q-mark">?</span>
          </div>
          <div class="card-face card-front">
            <img src="${card.src}" alt="${card.name}">
          </div>
        `;
        el.addEventListener('click', () => flipCard(el));
        board.appendChild(el);
      });
    }

    function flipCard(el) {
      if (lockBoard) return;
      if (el.classList.contains('flipped') || el.classList.contains('matched')) return;
      if (flippedCards.length >= 2) return;

      el.classList.add('flipped');
      flippedCards.push(el);

      if (flippedCards.length === 2) {
        attempts++;
        document.getElementById('attempts').textContent = attempts;
        checkMatch();
      }
    }

    function checkMatch() {
      const [a, b] = flippedCards;
      if (a.dataset.pairId === b.dataset.pairId) {
        // Match!
        a.classList.add('matched');
        b.classList.add('matched');
        matchedPairs++;
        document.getElementById('pairs').textContent = matchedPairs;
        flippedCards = [];

        if (matchedPairs === CARDS.length) {
          setTimeout(showWin, 600);
        }
      } else {
        // No match - flip back
        lockBoard = true;
        setTimeout(() => {
          a.classList.remove('flipped');
          b.classList.remove('flipped');
          flippedCards = [];
          lockBoard = false;
        }, 1200);
      }
    }

    function showWin() {
      document.getElementById('winMsg').textContent =
        `מצאת את כל ${CARDS.length} הזוגות ב-${attempts} ניסיונות!`;
      document.getElementById('overlay').classList.add('show');
      launchConfetti();
    }

    function closeOverlay() {
      document.getElementById('overlay').classList.remove('show');
    }

    function launchConfetti() {
      const colors = ['#ff6f61', '#ffcc00', '#4CAF50', '#2196F3', '#9C27B0', '#FF9800'];
      for (let i = 0; i < 60; i++) {
        setTimeout(() => {
          const c = document.createElement('div');
          c.className = 'confetti';
          c.style.left = Math.random() * 100 + 'vw';
          c.style.background = colors[Math.floor(Math.random() * colors.length)];
          c.style.animationDuration = (2 + Math.random() * 3) + 's';
          c.style.width = (8 + Math.random() * 8) + 'px';
          c.style.height = (8 + Math.random() * 8) + 'px';
          document.body.appendChild(c);
          setTimeout(() => c.remove(), 5000);
        }, i * 50);
      }
    }

    // Start!
    initGame();
  </script>
</body>
</html>
